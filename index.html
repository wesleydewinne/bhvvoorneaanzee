<body>
<div id="root"></div>

<!-- React entry -->
<script type="module" src="/src/main.jsx"></script>

<!-- Google Analytics (deferred to idle/load to reduce main-thread impact) -->
<script>
  (function(){
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') return;

    function loadGtag(){
      if (window.gtag) return;
      var s = document.createElement('script');
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-KNSP4TFGL3';
      s.async = true;
      document.head.appendChild(s);

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-KNSP4TFGL3');
    }

    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadGtag, {timeout: 5000});
    } else {
      window.addEventListener('load', loadGtag);
      setTimeout(loadGtag, 8000);
    }
  })();
</script>

</body>
</html>
